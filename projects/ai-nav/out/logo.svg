<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 凌厉版轮回眼 - 透明底 -->
  
  <!-- 外圈 - 加粗 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#ff1744" stroke-width="5"/>
  
  <!-- 锯齿装饰 -->
  <g stroke="#ff1744" stroke-width="2">
    <line x1="100" y1="5" x2="100" y2="15"/>
    <line x1="100" y1="185" x2="100" y2="195"/>
    <line x1="5" y1="100" x2="15" y2="100"/>
    <line x1="185" y1="100" x2="195" y2="100"/>
    <line x1="33" y1="33" x2="40" y2="40"/>
    <line x1="167" y1="33" x2="160" y2="40"/>
    <line x1="33" y1="167" x2="40" y2="160"/>
    <line x1="167" y1="167" x2="160" y2="160"/>
  </g>
  
  <!-- 第二圈 -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ff1744" stroke-width="3"/>
  
  <!-- 第三圈 -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#ff1744" stroke-width="2"/>
  
  <!-- 6个菱形波纹 - 更锐利 -->
  <g fill="#ff1744">
    <polygon points="100,30 107,45 100,60 93,45"/>
    <polygon points="160,65 175,72 160,79 145,72"/>
    <polygon points="160,135 175,128 160,121 145,128"/>
    <polygon points="100,170 107,155 100,140 93,155"/>
    <polygon points="40,135 55,128 40,121 25,128"/>
    <polygon points="40,65 55,72 40,79 25,72"/>
  </g>
  
  <!-- 放射线 - 增加凌厉感 -->
  <g stroke="#ff1744" stroke-width="1.5" opacity="0.7">
    <line x1="100" y1="20" x2="100" y2="35"/>
    <line x1="156" y1="56" x2="145" y2="65"/>
    <line x1="156" y1="144" x2="145" y2="135"/>
    <line x1="100" y1="180" x2="100" y2="165"/>
    <line x1="44" y1="144" x2="55" y2="135"/>
    <line x1="44" y1="56" x2="55" y2="65"/>
  </g>
  
  <!-- 中心瞳孔 - 多层 -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="#ff1744" stroke-width="2"/>
  <circle cx="100" cy="100" r="14" fill="#ff1744"/>
  <circle cx="100" cy="100" r="6" fill="white"/>
</svg>
